name: Release

on:
  push:
    branches: [main]

env:
  VERSION_BASE: "0.1"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set version
        id: version
        run: |
          VERSION="${VERSION_BASE}.${{ github.run_number }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(gh release list --limit 1 --json tagName -q '.[0].tagName' 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log ${PREV_TAG}..HEAD --pretty=format:"• %s" --no-merges | head -30)
          else
            CHANGES=$(git log --pretty=format:"• %s" --no-merges -10)
          fi
          {
            echo "## What's Changed"
            echo ""
            echo "$CHANGES"
          } > /tmp/release-notes.md
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh release delete "v${VERSION}" --yes 2>/dev/null || true
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --latest \
            --notes-file /tmp/release-notes.md
